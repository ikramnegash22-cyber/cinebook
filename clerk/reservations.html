<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservierungen – CineBook</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link rel="stylesheet" href="../css/accessibility.css"/>
</head>
<body class="admin-body">
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  <div class="admin-layout">
    <aside class="admin-sidebar" role="navigation" aria-label="Clerk Navigation">
      <div class="admin-logo">🎬 <span>CineBook Clerk</span></div>
      <nav>
        <ul class="admin-nav">
          <li><a href="dashboard.html">📊 Dashboard</a></li>
          <li><a href="reservations.html" class="active" aria-current="page">🎟️ Reservierungen</a></li>
          <li><a href="../index.html">🏠 Zur Website</a></li>
        </ul>
      </nav>
      <div class="admin-sidebar-footer">
        <span id="adminUserName"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline">Abmelden</button>
      </div>
    </aside>
    <div class="admin-main">
      <header class="admin-header" role="banner">
        <h1>Reservierungen</h1>
        <div class="admin-header-actions">
          <button id="themeToggle" class="btn-icon" aria-label="Design umschalten">🌙</button>
        </div>
      </header>
      <main id="main-content" class="admin-content">
        <section class="admin-section" aria-labelledby="lookupTitle">
          <h2 id="lookupTitle">Buchung nachschlagen</h2>
          <div class="booking-lookup">
            <div class="search-box">
              <label for="bookingIdSearch">Buchungs-ID</label>
              <input type="search" id="bookingIdSearch" placeholder="z.B. BK-001"/>
              <button id="lookupBtn" class="btn btn-primary">Suchen</button>
            </div>
            <div id="lookupResult" class="lookup-result hidden" aria-live="polite"></div>
          </div>
        </section>
        <section class="admin-section" aria-labelledby="allReservationsTitle">
          <h2 id="allReservationsTitle">Alle Buchungen</h2>
          <div class="admin-toolbar">
            <div class="search-box">
              <label for="reservationSearch" class="sr-only">Suchen</label>
              <input type="search" id="reservationSearch" placeholder="Suchen..."/>
            </div>
            <div class="filter-group">
              <label for="statusFilter">Status</label>
              <select id="statusFilter">
                <option value="">Alle Status</option>
                <option value="confirmed">Bestaetigt</option>
                <option value="pending">Ausstehend</option>
                <option value="cancelled">Storniert</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="dateFilterRes">Datum</label>
              <input type="date" id="dateFilterRes"/>
            </div>
          </div>
          <div class="table-wrapper">
            <table id="reservationsTable" class="admin-table" aria-label="Reservierungsliste">
              <thead><tr><th scope="col">Buchungs-ID</th><th scope="col">Benutzer</th><th scope="col">Film</th><th scope="col">Sitze</th><th scope="col">Ticketart</th><th scope="col">Preis</th><th scope="col">Datum</th><th scope="col">Status</th><th scope="col">Aktionen</th></tr></thead>
              <tbody id="reservationsTbody"><tr><td colspan="9" class="table-empty">Wird geladen...</td></tr></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="reservationModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="reservationModalTitle">
    <div class="modal-overlay" id="reservationModalOverlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="closeReservationModal" aria-label="Schliessen">&times;</button>
      <h2 id="reservationModalTitle">Buchungsdetails</h2>
      <div id="reservationDetail" class="reservation-detail"></div>
      <div class="modal-actions">
        <button id="cancelReservationBtn" class="btn btn-danger">Stornieren</button>
        <button id="closeReservationModalBtn" class="btn btn-outline">Schliessen</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/movies.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
