<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filme verwalten – CineBook Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link rel="stylesheet" href="../css/accessibility.css"/>
</head>
<body class="admin-body">
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  <div class="admin-layout">
    <aside class="admin-sidebar" role="navigation" aria-label="Admin Navigation">
      <div class="admin-logo">🎬 <span>CineBook Admin</span></div>
      <nav>
        <ul class="admin-nav">
          <li><a href="dashboard.html">📊 Dashboard</a></li>
          <li><a href="movies.html" class="active" aria-current="page">🎬 Filme</a></li>
          <li><a href="showtimes.html">📅 Spielzeiten</a></li>
          <li><a href="users.html">👥 Benutzer</a></li>
          <li><a href="../clerk/reservations.html">🎟️ Reservierungen</a></li>
          <li><a href="../index.html">🏠 Zur Website</a></li>
        </ul>
      </nav>
      <div class="admin-sidebar-footer">
        <span id="adminUserName"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline">Abmelden</button>
      </div>
    </aside>
    <div class="admin-main">
      <header class="admin-header" role="banner">
        <h1>Filme verwalten</h1>
        <div class="admin-header-actions">
          <button id="themeToggle" class="btn-icon" aria-label="Design umschalten">🌙</button>
          <button id="addMovieBtn" class="btn btn-primary">➕ Film hinzufuegen</button>
        </div>
      </header>
      <main id="main-content" class="admin-content">
        <div class="admin-toolbar">
          <div class="search-box">
            <label for="movieSearch" class="sr-only">Filme suchen</label>
            <input type="search" id="movieSearch" placeholder="Filme suchen..."/>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="moviesTable" class="admin-table" aria-label="Filmliste">
            <thead><tr><th scope="col">ID</th><th scope="col">Titel</th><th scope="col">Genre</th><th scope="col">Dauer</th><th scope="col">FSK</th><th scope="col">Preis</th><th scope="col">Aktionen</th></tr></thead>
            <tbody id="moviesTbody"><tr><td colspan="7" class="table-empty">Wird geladen...</td></tr></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <div id="movieModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="movieModalTitle">
    <div class="modal-overlay" id="movieModalOverlay"></div>
    <div class="modal-content modal-large">
      <button class="modal-close" id="closeMovieModal" aria-label="Schliessen">&times;</button>
      <h2 id="movieModalTitle">Film hinzufuegen</h2>
      <form id="movieForm" novalidate>
        <input type="hidden" id="movieId" name="id"/>
        <div class="form-grid">
          <div class="form-group"><label for="movieTitle">Titel *</label><input type="text" id="movieTitle" name="title" required/></div>
          <div class="form-group"><label for="movieDirector">Regisseur</label><input type="text" id="movieDirector" name="director"/></div>
          <div class="form-group"><label for="movieDuration">Dauer (Min)</label><input type="number" id="movieDuration" name="duration" min="1"/></div>
          <div class="form-group"><label for="movieRating">FSK</label><select id="movieRating" name="rating"><option value="G">G</option><option value="PG">PG</option><option value="PG-13" selected>PG-13</option><option value="R">R</option></select></div>
          <div class="form-group form-group-full"><label for="movieDescription">Beschreibung</label><textarea id="movieDescription" name="description" rows="3"></textarea></div>
          <div class="form-group form-group-full"><label for="movieGenre">Genre (kommagetrennt)</label><input type="text" id="movieGenre" name="genre" placeholder="z.B. Action, Drama"/></div>
          <div class="form-group form-group-full"><label for="movieCast">Besetzung (kommagetrennt)</label><input type="text" id="movieCast" name="cast"/></div>
          <div class="form-group"><label for="moviePriceNormal">Preis Normal</label><input type="number" id="moviePriceNormal" name="priceNormal" step="0.50" min="0"/></div>
          <div class="form-group"><label for="moviePriceStudent">Preis Student</label><input type="number" id="moviePriceStudent" name="priceStudent" step="0.50" min="0"/></div>
          <div class="form-group"><label for="moviePriceSenior">Preis Senior</label><input type="number" id="moviePriceSenior" name="priceSenior" step="0.50" min="0"/></div>
          <div class="form-group"><label for="moviePriceVip">Preis VIP</label><input type="number" id="moviePriceVip" name="priceVip" step="0.50" min="0"/></div>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelMovieModal" class="btn btn-outline">Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <div class="modal-overlay" id="deleteModalOverlay"></div>
    <div class="modal-content modal-small">
      <h2 id="deleteModalTitle">Film loeschen</h2>
      <p id="deleteModalText">Moechten Sie diesen Film wirklich loeschen?</p>
      <div class="modal-actions">
        <button id="cancelDelete" class="btn btn-outline">Abbrechen</button>
        <button id="confirmDelete" class="btn btn-danger">Loeschen</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/movies.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
